<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>llama-crab LFM Chat</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <section class="chat">
        <header>
          <p class="eyebrow">llama-crab local</p>
          <h1>LFM2.5 350M Chat</h1>
          <p id="status" class="status"></p>
        </header>

        <form id="chat-form" class="composer">
          <label for="prompt">Mensagem</label>
          <textarea id="prompt" rows="4" placeholder="Digite uma pergunta para o modelo local"></textarea>
          <div class="actions">
            <button id="send-button" type="submit">Enviar</button>
            <button id="clear-button" type="button">Limpar</button>
          </div>
        </form>

        <section class="response" aria-live="polite">
          <h2>Resposta</h2>
          <p id="answer"></p>
        </section>
      </section>
    </main>
  </body>
</html>
